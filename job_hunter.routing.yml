  defaults:
    _controller: '\Drupal\job_hunter\Controller\ApplicationSubmissionController::applicationsDashboard'
    _title: 'My Applications'
  methods: [GET]
  requirements:
    _permission: 'access job hunter'
    _user_is_logged_in: 'TRUE'

