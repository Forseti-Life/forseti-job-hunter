    _csrf_token: 'TRUE'
    _csrf_request_header_mode: 'TRUE'
  methods: [POST]

# Job Discovery - Save Job Endpoint
job_hunter.save_job:
  path: '/jobhunter/job-discovery/save'
  defaults:
    _controller: '\Drupal\job_hunter\Controller\UserProfileController::saveJob'
  requirements:
    _permission: 'access job hunter'
    _csrf_token: 'TRUE'
    _csrf_request_header_mode: 'TRUE'
  methods: [POST]

# Job Discovery - Legacy Save Job Link Endpoint (GET)
job_hunter.addposting:
  path: '/jobhunter/addposting'
  defaults:
    _controller: '\Drupal\job_hunter\Controller\ApplicationActionController::addPostingFromSearch'
  requirements:
    _user_is_logged_in: 'TRUE'
    # _csrf_token: controller-level CSRF validation implemented in POST handler (addPostingFromSearch validates X-CSRF-Token header / csrf_token body param)
  methods: [GET, POST]

