# Job Hunter Routes
# Complete routing configuration for job hunter module
# Routes accessible to authenticated users

# Job Hunter Dashboard (Main Landing Page)
job_hunter.dashboard:
  path: '/jobhunter'
  defaults:
    _controller: '\Drupal\job_hunter\Controller\ApplicationSubmissionController::dashboard'
    _title: 'Job Hunter Dashboard'
  requirements:
    _access: 'TRUE'

# Job Hunter Home (alternate entry point)
job_hunter.home:
  path: '/jobhunter/home'
  defaults:
    _controller: '\Drupal\job_hunter\Controller\JobHunterHomeController::home'
    _title: 'Job Hunter'
  requirements:
    _permission: 'access job hunter'

# Queue Management Routes (Admin only)
job_hunter.queue_run:
  path: '/jobhunter/queue/run'
  defaults:
    _controller: '\Drupal\job_hunter\Controller\JobHunterHomeController::runQueueAjax'
  methods: [POST]
  requirements:
    _csrf_token: 'TRUE'
    _csrf_request_header_mode: 'TRUE'
    _permission: 'administer job application automation'

job_hunter.queue_run_all:
  path: '/jobhunter/queue/run-all'
  defaults:
    _controller: '\Drupal\job_hunter\Controller\JobHunterHomeController::runAllQueuesAjax'
  methods: [POST]
  requirements:
    _csrf_token: 'TRUE'
    _csrf_request_header_mode: 'TRUE'
    _permission: 'administer job application automation'

job_hunter.queue_status:
  path: '/jobhunter/queue/status'
  defaults:
    _controller: '\Drupal\job_hunter\Controller\JobHunterHomeController::getQueueStatusAjax'
  methods: [GET]
  requirements:
    _permission: 'access job hunter'

job_hunter.queue_logs:
  path: '/jobhunter/queue/logs'
  defaults:
    _controller: '\Drupal\job_hunter\Controller\JobHunterHomeController::getQueueLogsAjax'
  methods: [GET]
  requirements:
    _permission: 'administer job application automation'

job_hunter.queue_management:
  path: '/jobhunter/queue-management'
  defaults:
    _controller: '\Drupal\job_hunter\Controller\JobHunterHomeController::queueManagement'
    _title: 'Queue Management'
  requirements:
    _permission: 'administer job application automation'

