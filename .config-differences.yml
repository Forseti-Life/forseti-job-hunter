# Expected Configuration Differences Between Dev and Production
#
# This file documents configs that are intentionally different between
# development and production environments. The compare-config.sh script
# will exclude these from "unexpected differences" reports.
#
# Format:
#   file_pattern: glob pattern or exact filename
#   reason: why this difference exists
#   category: type of difference (module, performance, security, debug, feature)

expected_differences:
  # Backup & Migrate - Production only
  - pattern: "backup_migrate.*"
    reason: "Backup module only needed in production for scheduled backups"
    category: "module"
    environments:
      production: "installed"
      development: "not installed"
  
  # Admin Toolbar - May differ
  - pattern: "admin_toolbar.*"
    reason: "Admin toolbar settings may differ for development convenience"
    category: "debug"
    note: "Dev may have more aggressive toolbar caching disabled"
  
  # Google Analytics / Tracking - Production only
  - pattern: "google_tag.*"
    reason: "Analytics only track production traffic, not dev"
    category: "feature"
    environments:
      production: "configured with real tracking ID"
      development: "disabled or test ID"
  
  # Metatag - May differ
  - pattern: "metatag.metatag_defaults.*"
    reason: "SEO tags should prevent dev indexing but allow prod"
    category: "security"
    note: "Dev should have noindex, nofollow"
  
  # Performance settings
  - pattern: "system.performance.yml"
    reason: "Caching aggressive in prod, disabled in dev for debugging"
    category: "performance"
    environments:
      production: "CSS/JS aggregation ON, page cache ON"
      development: "Aggregation OFF for easier debugging"
  
  # Logging settings
  - pattern: "system.logging.yml"
    reason: "More verbose logging in development"
    category: "debug"
    environments:
      production: "error level logging"
      development: "verbose/debug logging"
  
  # Development modules
  - pattern: "devel.*"
    reason: "Development helper modules only in dev environment"
    category: "module"
    environments:
      production: "not installed"
      development: "installed"
  
  - pattern: "kint.*"
    reason: "Debugging tool only in dev"
    category: "module"
    environments:
      production: "not installed"
      development: "installed"
  
  - pattern: "webprofiler.*"
    reason: "Profiling tool only in dev"
    category: "module"
    environments:
      production: "not installed"
      development: "installed"

# Additional notes can be added here for complex scenarios
notes:
  - "Always review 'unexpected differences' carefully"
  - "Update this file when adding environment-specific modules"
  - "Category types: module, performance, security, debug, feature"
  - "If a difference seems wrong, investigate before marking as expected"

# To ignore a specific file temporarily during reconciliation:
# temporary_ignores:
#   - "config_name.yml"  # Remove after investigating
