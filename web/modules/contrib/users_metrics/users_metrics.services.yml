services:
  users_metrics.dblog_enabled_access_check:
    class: Drupal\users_metrics\Access\DblogEnabledAccessCheck
    arguments: ['@module_handler']
    tags:
      - { name: access_check, applies_to: _users_metrics_dblog_enabled }

  users_metrics.user_exclusion:
    class: Drupal\users_metrics\Service\UserExclusionService
    arguments: ['@config.factory', '@database']

  users_metrics.field_label_resolver:
    class: Drupal\users_metrics\Service\FieldLabelResolver
    arguments: ['@language_manager', '@entity_type.manager', '@entity_field.manager']
