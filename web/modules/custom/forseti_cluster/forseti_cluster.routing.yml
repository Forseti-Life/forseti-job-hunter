forseti_cluster.admin:
  path: '/admin/forseti/cluster'
  defaults:
    _controller: '\Drupal\forseti_cluster\Controller\ClusterAdminController::overview'
    _title: 'Cluster Overview'
  requirements:
    _permission: 'administer forseti cluster'

forseti_cluster.peers:
  path: '/admin/forseti/cluster/peers'
  defaults:
    _controller: '\Drupal\forseti_cluster\Controller\ClusterAdminController::peers'
    _title: 'Peer Registry'
  requirements:
    _permission: 'administer forseti cluster'

forseti_cluster.peer_activate:
  path: '/admin/forseti/cluster/peers/{peer_id}/activate'
  defaults:
    _controller: '\Drupal\forseti_cluster\Controller\ClusterAdminController::activatePeer'
    _title: 'Activate Peer'
  requirements:
    _permission: 'administer forseti cluster'
    _csrf_token: 'TRUE'
  methods: [POST]

forseti_cluster.peer_activate_get:
  path: '/admin/forseti/cluster/peers/{peer_id}/activate'
  defaults:
    _controller: '\Drupal\forseti_cluster\Controller\ClusterAdminController::activatePeer'
    _title: 'Activate Peer'
  requirements:
    _permission: 'administer forseti cluster'
  methods: [GET]

forseti_cluster.capabilities:
  path: '/admin/forseti/cluster/capabilities'
  defaults:
    _controller: '\Drupal\forseti_cluster\Controller\ClusterAdminController::capabilities'
    _title: 'Capabilities'
  requirements:
    _permission: 'administer forseti cluster'

forseti_cluster.audit:
  path: '/admin/forseti/cluster/audit'
  defaults:
    _controller: '\Drupal\forseti_cluster\Controller\ClusterAdminController::auditLog'
    _title: 'Cluster Audit Log'
  requirements:
    _permission: 'administer forseti cluster'

forseti_cluster.mission:
  path: '/admin/forseti/cluster/mission'
  defaults:
    _controller: '\Drupal\forseti_cluster\Controller\ClusterAdminController::mission'
    _title: 'Mission Alignment'
  requirements:
    _permission: 'administer forseti cluster'

forseti_cluster.service_requests:
  path: '/admin/forseti/cluster/service-requests'
  defaults:
    _controller: '\Drupal\forseti_cluster\Controller\ClusterAdminController::serviceRequests'
    _title: 'Service Requests'
  requirements:
    _permission: 'administer forseti cluster'

forseti_cluster.settings:
  path: '/admin/forseti/cluster/settings'
  defaults:
    _form: '\Drupal\forseti_cluster\Form\ClusterSettingsForm'
    _title: 'Cluster Settings'
  requirements:
    _permission: 'administer forseti cluster'
