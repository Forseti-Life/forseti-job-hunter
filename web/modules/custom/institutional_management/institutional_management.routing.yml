institutional_management.landing:
  path: '/institutional'
  defaults:
    _controller: '\Drupal\institutional_management\Controller\InstitutionalController::landing'
    _title: 'Institutional Management'
  requirements:
    _permission: 'access content'

institutional_management.dashboard:
  path: '/institutional/dashboard'
  defaults:
    _controller: '\Drupal\institutional_management\Controller\InstitutionalController::dashboard'
    _title: 'Institution Dashboard'
  requirements:
    _permission: 'access institutional dashboard'

institutional_management.financial_health:
  path: '/internal/financial-health'
  defaults:
    _controller: '\Drupal\institutional_management\Controller\InstitutionalController::financialHealth'
    _title: 'Financial Health'
  requirements:
    _permission: 'view institution reports'

institutional_management.my_groups:
  path: '/my-groups'
  defaults:
    _controller: '\Drupal\institutional_management\Controller\InstitutionalController::myGroups'
    _title: 'My Groups'
  requirements:
    _user_is_logged_in: 'TRUE'

institutional_management.group_view:
  path: '/group/{group}/map'
  defaults:
    _controller: '\Drupal\institutional_management\Controller\GroupMapController::viewGroupMap'
    _title: 'Group Map'
  requirements:
    _user_is_logged_in: 'TRUE'
    group: \d+

institutional_management.settings:
  path: '/admin/config/forseti/institutional'
  defaults:
    _form: '\Drupal\institutional_management\Form\InstitutionalSettingsForm'
    _title: 'Institutional Management Settings'
  requirements:
    _permission: 'administer site configuration'
