agent_evaluation.settings:
  type: config_object
  label: 'AI Conversation settings'
  mapping:
    aws_access_key_id:
      type: string
      label: 'AWS Access Key ID'
    aws_secret_access_key:
      type: string
      label: 'AWS Secret Access Key'
    aws_region:
      type: string
      label: 'AWS Region'
    aws_model:
      type: string
      label: 'AWS Bedrock Model ID'
    system_prompt:
      type: text
      label: 'System Prompt'
    max_tokens:
      type: integer
      label: 'Maximum tokens per response'
    max_recent_messages:
      type: integer
      label: 'Maximum recent messages to keep'
    summary_frequency:
      type: integer
      label: 'Update summary every N messages'
    max_tokens_before_summary:
      type: integer
      label: 'Maximum tokens before triggering summary update'
    debug_logging:
      type: boolean
      label: 'Enable debug logging'