copilot_agent_tracker.dashboard:
  path: '/admin/reports/copilot-agent-tracker'
  defaults:
    _controller: '\Drupal\copilot_agent_tracker\Controller\DashboardController::legacyDashboardRedirect'
    _title: 'LangGraph Dashboard'
  requirements:
    _permission: 'administer copilot agent tracker'

copilot_agent_tracker.agent:
