copilot_agent_tracker.api_event:
  path: '/api/copilot-agent-tracker/event'
  defaults:
    _controller: '\Drupal\copilot_agent_tracker\Controller\ApiController::event'
  methods: [POST]
  requirements:
    _csrf_request_header_mode: TRUE
    # Token-gated in controller; route must be reachable by non-browser senders.
    _access: 'TRUE'
  options:
    _format: json

