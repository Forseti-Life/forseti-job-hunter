  path: '/admin/reports/copilot-agent-tracker/agent/{agent_id}/inbox/{item_id}'
  defaults:
    _controller: '\Drupal\copilot_agent_tracker\Controller\DashboardController::agentInboxItem'
    _title: 'Inbox item'
  requirements:
    _permission: 'administer copilot agent tracker'

