copilot_agent_tracker.observe_settings:
  type: config_object
  label: 'LangGraph Console Observe Settings'
  mapping:
    max_tick_history:
      type: integer
      label: 'Max tick history'
      description: 'Maximum number of recent ticks to retain in memory (1-10000).'
    metrics_trend_window:
      type: integer
      label: 'Metrics trend window (minutes)'
      description: 'Time window for calculating metrics trends in minutes (1-1440 = 1 min to 24 hours).'
    drift_threshold_pct:
      type: float
      label: 'Drift threshold (%)'
      description: 'Performance drift alert threshold in percent (0.1-100).'
    alert_retention_days:
      type: integer
      label: 'Alert retention (days)'
      description: 'How many days to retain alert records (1-365).'
    canary_duration_hours:
      type: float
      label: 'Canary duration (hours)'
      description: 'Duration for canary deployment testing in hours (0.1-168 = 6 min to 7 days).'
