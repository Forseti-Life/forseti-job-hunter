services:
  copilot_agent_tracker.dashboard_repository:
    class: Drupal\copilot_agent_tracker\Repository\DashboardRepository
    arguments: ['@database']
  copilot_agent_tracker.storage:
    class: Drupal\copilot_agent_tracker\Service\AgentTrackerStorage
    arguments: ['@database', '@datetime.time']
  copilot_agent_tracker.audit_logger:
    class: Drupal\copilot_agent_tracker\Service\AuditLogger
    arguments: ['@database', '@current_user']
  copilot_agent_tracker.health_aggregator:
    class: Drupal\copilot_agent_tracker\Service\HealthAggregator
    arguments: ['@cache.default', '@file_system']

