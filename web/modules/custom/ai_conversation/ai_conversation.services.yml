services:
  logger.channel.ai_conversation:
    parent: logger.channel_base
    arguments: ['ai_conversation']

  ai_conversation.storage:
    class: Drupal\ai_conversation\Service\AIConversationStorageService
    arguments: ['@database']
    tags:
      - { name: service }

  ai_conversation.prompt_manager:
    class: Drupal\ai_conversation\Service\PromptManager
    arguments: ['@config.factory', '@entity_type.manager', '@logger.channel.ai_conversation']
    tags:
      - { name: service }

  ai_conversation.ollama_api_service:
    class: Drupal\ai_conversation\Service\OllamaApiService
    arguments: ['@config.factory', '@logger.factory', '@http_client']
    tags:
      - { name: service }

  ai_conversation.ai_api_service:
    class: Drupal\ai_conversation\Service\AIApiService
    arguments: ['@config.factory', '@logger.factory', '@entity_type.manager', '@ai_conversation.prompt_manager', '@ai_conversation.storage', '@ai_conversation.ollama_api_service', '@user.data']
    tags:
      - { name: service }

  ai_conversation.commands:
    class: Drupal\ai_conversation\Commands\AiDebugCommands
    tags:
      - { name: drush.command }
