forseti_games.home:
  path: '/games'
  defaults:
    _controller: '\Drupal\forseti_games\Controller\GameController::home'
    _title: 'Forseti Games'
  requirements:
    _user_is_logged_in: 'TRUE'

forseti_games.block_matcher:
  path: '/games/block-matcher'
  defaults:
    _controller: '\Drupal\forseti_games\Controller\GameController::blockMatcher'
    _title: 'Block Matcher'
  requirements:
    _user_is_logged_in: 'TRUE'

forseti_games.api.high_scores:
  path: '/api/games/high-scores/{game_id}'
  defaults:
    _controller: '\Drupal\forseti_games\Controller\HighScoreController::getHighScores'
  requirements:
    _permission: 'access content'
  methods: [GET]

forseti_games.api.submit_score:
  path: '/api/games/submit-score'
  defaults:
    _controller: '\Drupal\forseti_games\Controller\HighScoreController::submitScore'
  requirements:
    _user_is_logged_in: 'TRUE'
    _csrf_token: 'TRUE'
  methods: [POST]

forseti_games.api.check_score:
  path: '/api/games/check-score'
  defaults:
    _controller: '\Drupal\forseti_games\Controller\HighScoreController::checkScore'
  requirements:
    _user_is_logged_in: 'TRUE'
    _csrf_token: 'TRUE'
  methods: [POST]
