company_research.research_form:
  path: '/company-research'
  defaults:
    _form: '\Drupal\company_research\Form\CompanyResearchForm'
    _title: 'Company Research'
  requirements:
    _permission: 'access company research'

company_research.results:
  path: '/company-research/results/{research_id}'
  defaults:
    _controller: '\Drupal\company_research\Controller\CompanyResearchController::results'
    _title: 'Research Results'
  requirements:
    _permission: 'access company research'
    research_id: \d+

company_research.refresh:
  path: '/company-research/refresh/{research_id}'
  defaults:
    _controller: '\Drupal\company_research\Controller\CompanyResearchController::refresh'
  methods: [POST]
  requirements:
    _csrf_token: 'TRUE'
    _permission: 'access company research'
    research_id: \d+
