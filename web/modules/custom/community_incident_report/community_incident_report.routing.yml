community_incident_report.report_form:
  path: '/community/report'
  defaults:
    _form: '\Drupal\community_incident_report\Form\CommunityIncidentReportForm'
    _title: 'Report a Safety Incident'
  requirements:
    _permission: 'submit community incident reports'

community_incident_report.listing:
  path: '/community-reports'
  defaults:
    _controller: '\Drupal\community_incident_report\Controller\CommunityReportController::listing'
    _title: 'Community Safety Reports'
  requirements:
    _permission: 'view community incident reports'

community_incident_report.admin_listing:
  path: '/admin/content/community-reports'
  defaults:
    _controller: '\Drupal\community_incident_report\Controller\CommunityReportController::adminListing'
    _title: 'Community Reports — Moderation'
  requirements:
    _permission: 'administer site configuration'

community_incident_report.admin_toggle:
  path: '/admin/content/community-reports/{nid}/toggle'
  defaults:
    _controller: '\Drupal\community_incident_report\Controller\CommunityReportController::togglePublish'
  methods: [POST]
  requirements:
    _permission: 'administer site configuration'
    _csrf_token: 'TRUE'
    nid: \d+

community_incident_report.geojson:
  path: '/api/community-incidents/geojson'
  defaults:
    _controller: '\Drupal\community_incident_report\Controller\CommunityReportController::geojson'
  methods: [GET]
  requirements:
    _permission: 'view community incident reports'
